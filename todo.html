<style>

.f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.stats-row { display: flex; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
.stats-txt { font-size: 0.78rem; color: var(--text-muted); }
.clear-btn { margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size:$
.clear-btn:hover { color: var(--danger); }

.task-area::-webkit-scrollbar { width: 4px; }
.task-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.section-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.09em; margin$

.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
.item { display: flex; align-items: flex-start; gap: 11px; background: var(--surface); border: 1px solid var(--border$
@keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.item:hover { border-color: #3a3a50; } 
.item.done { opacity: 0.42; }
@keyframes completePulse { 0% { background: var(--surface); } 25% { background: rgba(90,247,160,0.10); border-color: $
.item.completing { animation: completePulse 0.55s ease forwards; }
.drag-handle { flex-shrink: 0; color: var(--text-muted); cursor: grab; font-size: 1rem; line-height: 1; padding: 2px $
.item:hover .drag-handle { opacity: 0.6; }
.drag-handle:hover { opacity: 1 !important; }
.drag-handle:active { cursor: grabbing; }
.item.dragging { opacity: 0.3 !important; border-style: dashed !important; }
.item.drag-over { border-color: var(--accent) !important; border-style: dashed !important; background: rgba(124,106,2$
.chk { appearance: none; width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink:$
.chk:hover { border-color: var(--accent); }
.chk:checked { background: var(--success); border-color: var(--success); animation: checkPop 0.32s cubic-bezier(0.34,$
@keyframes checkPop { 0% { transform: scale(0.75); } 60% { transform: scale(1.22); } 100%{ transform: scale(1); } }
.chk:checked::after { content: ''; position: absolute; top: 2px; left: 4.5px; width: 7px; height: 10px; border: 2px s$
.item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.item-top { display: flex; align-items: center; gap: 7px; min-width: 0; }
.cat-tag { font-size: 0.62rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; letter-spacin$
.cat-tag.recruit { background: rgba(247,162,90,0.13); color: var(--cat-recruit); }
.cat-tag.inrudder { background: rgba(124,106,247,0.15); color: var(--cat-inrudder); } 
.cat-tag.private { background: rgba(90,247,160,0.12); color: var(--cat-private); }
.item-text { flex: 1; font-size: 0.93rem; line-height: 1.4; word-break: break-word; min-width: 0; cursor: default; }
.done .item-text { text-decoration: line-through; color: var(--text-muted); }
.item-memo { width: 100%; background: none; border: none; border-top: 1px solid transparent; color: var(--text-muted)$
.item-memo:focus { border-top-color: var(--border); color: var(--text); }
.item-memo::placeholder { color: #333345; }
.done .item-memo { pointer-events: none; }
.btn-del { background: rgba(247,90,90,0.07); border: 1px solid rgba(247,90,90,0.2); border-radius: 6px; color: var(--$

.edit-input { flex: 1; background: var(--bg); border: 1px solid var(--accent); border-radius: 6px; color: var(--text)$

#p-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
@media (max-width: 768px) {
  body { flex-direction: column !important; height: 100svh !important; overflow: hidden; }
  .sidebar { width: 100% !important; height: auto !important; flex-shrink: 0 !important; flex-direction: column !impo$
  .sidebar-logo { padding: 12px 16px 6px; font-size: 0.95rem; border-bottom: none; }
  .sidebar-dates { display: flex !important; flex-direction: row !important; overflow-x: auto !important; overflow-y:$
  .sidebar-dates::-webkit-scrollbar { display: none; }
  .date-item { flex-direction: column !important; align-items: center !important; text-align: center; flex-shrink: 0;$
  .d-label { font-size: 0.82rem; flex-direction: column !important; align-items: center !important; gap: 1px; }
  .today-badge { font-size: 0.52rem; }
  .d-week { font-size: 0.6rem; }
  .d-count { display: none; }
  .has-todo-badge { right: 2px; top: 2px; transform: none; font-size: 0.55rem; min-width: 14px; height: 14px; }
  .main { flex: 1 !important; overflow-y: auto !important; overflow-x: hidden !important; padding: 16px 14px !importa$
  .main-date-label { font-size: 1.15rem !important; white-space: normal; line-height: 1.3; }
  .main-meta { margin-top: 6px; }
  .input-area { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 2$
  .input-row { flex-wrap: wrap !important; gap: 6px; }
  .task-input { width: 100% !important; flex: none !important; font-size: 1rem; padding: 10px 14px; }
  .cat-select { flex: 1 !important; font-size: 0.85rem; padding: 8px 10px; height: 40px; }
  .btn-add { width: 48px !important; height: 40px !important; font-size: 1.4rem; }
  .filter-bar { flex-wrap: nowrap !important; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; padding-bo$
  .filter-bar::-webkit-scrollbar { display: none; }
  .f-btn { flex-shrink: 0; }
  .stats-row { margin-bottom: 8px; }
  .task-area { flex: none !important; overflow: visible !important; padding-right: 0; }
  .item { padding: 11px 12px; gap: 10px; }
  .chk { width: 22px !important; height: 22px !important; margin-top: 2px; }
  .chk:checked::after { top: 3px; left: 5.5px; width: 7px; height: 10px; }
  .item-text { font-size: 0.9rem; }
  .btn-del { font-size: 0.7rem; padding: 5px 10px; }

<body>
<canvas id="p-canvas"></canvas>
<aside class="sidebar">
  <div class="sidebar-logo">TODO</div>
  <div class="sidebar-dates" id="sidebarDates"></div>
</aside>
<main class="main">
  <div class="main-header">
    <div class="main-date-label" id="mainDateLabel"></div>
    <div class="main-meta">
      <span id="mainMeta"></span>
      <div class="progress-wrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <input type="text" class="task-input" id="taskInput" placeholder="新しいタスクを入力..." maxlength="200" autoco$
      <select class="cat-select" id="catSelect">
        <option value="recruit">仕事_Recruit</option>
        <option value="inrudder">仕事_InRudder</option>
        <option value="private">プライベート</option>
      </select>
      <button type="button" class="btn-add" id="addBtn">+</button>
    </div>
  </div>
  <div class="filter-bar">
    <button type="button" class="f-btn active" data-filter="all">すべて</button>
    <button type="button" class="f-btn" data-filter="active">未完了</button>
    <button type="button" class="f-btn" data-filter="done">完了</button>
    <button type="button" class="f-btn" data-filter="recruit">仕事_Recruit</button>
    <button type="button" class="f-btn" data-filter="inrudder">仕事_InRudder</button>
    <button type="button" class="f-btn" data-filter="private">プライベート</button>
  </div>
  <div class="stats-row">
    <span class="stats-txt" id="statsTxt"></span>
    <button type="button" class="clear-btn" id="clearDoneBtn" style="display:none">完了済みを削除</button>
  </div>
  <div class="task-area" id="taskArea"></div>
</main> 
<script>
const STORAGE_KEY = 'todos_v3';
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const CAT = { recruit: '仕事_Recruit', inrudder: '仕事_InRudder', private: 'プライベート' };
        
let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let selectedDate = todayStr();
let activeFilter = 'all';
      
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function dateToStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }
function buildSidebar(scrollToSelected = false) {
  const container = document.getElementById('sidebarDates');
  container.innerHTML = '';
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayS = todayStr();
  let selectedEl = null;

  for (let offset = -60; offset <= 60; offset++) {
    const d = new Date(today);
    d.setDate(today.getDate() + offset);
    const ds = dateToStr(d);
    const isToday = ds === todayS;
    const isSelected = ds === selectedDate;
      
    const ownTodos = todos.filter(t => t.date === ds);
    const doneCount = ownTodos.filter(t => t.done).length;
    const activeCount = ownTodos.filter(t => !t.done).length;
 
    const el = document.createElement('div');
    el.className = 'date-item' + (isToday ? ' today' : '') + (isSelected ? ' active' : '');
 
    const labelDiv = document.createElement('div');   
    labelDiv.className = 'd-label';
    labelDiv.textContent = `${d.getMonth()+1}/${d.getDate()}`;
    if (isToday) {
      const badge = document.createElement('span');
      badge.className = 'today-badge';
      badge.textContent = '今日';
      labelDiv.appendChild(badge);
    }
  
    const weekDiv = document.createElement('div');
    weekDiv.className = 'd-week';
    weekDiv.textContent = `（${WEEKDAYS[d.getDay()]}）`;
    
    const countDiv = document.createElement('div');
    countDiv.className = 'd-count';
    if (ownTodos.length > 0) {
      countDiv.textContent = `${doneCount}/${ownTodos.length} 完了`;
    }
    
    el.append(labelDiv, weekDiv, countDiv);
 
    if (activeCount > 0) {
      const badge = document.createElement('div');
      badge.className = 'has-todo-badge';
      badge.textContent = activeCount;
      el.appendChild(badge);
    }
    
    el.addEventListener('click', () => {
      selectedDate = ds;
      buildSidebar(false);
      renderMain();
    });
  
    container.appendChild(el);
    if (isSelected) selectedEl = el;
  }
    
  if (scrollToSelected && selectedEl) {
    requestAnimationFrame(() => {  
      selectedEl.scrollIntoView({ block: 'center', inline: 'center' });
    });
  }  
}   
    
function renderMain() {
  const d = new Date(selectedDate + 'T00:00:00');
  const todayS = todayStr();
  const isToday = selectedDate === todayS;
  const isFuture = selectedDate > todayS;
      
  document.getElementById('mainDateLabel').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
  document.getElementById('mainMeta').textContent =
    isToday ? '今日のタスク' : isFuture ? '予定' : '過去のタスク';
  const ownTodos = todos.filter(t => t.date === selectedDate);
  const doneCount = ownTodos.filter(t => t.done).length;
  const pct = ownTodos.length > 0 ? Math.round(doneCount / ownTodos.length * 100) : 0;
    
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statsTxt').textContent =
    ownTodos.length > 0 ? `${doneCount} / ${ownTodos.length} 件完了` : '';
  document.getElementById('clearDoneBtn').style.display = doneCount > 0 ? 'inline' : 'none';
    
  const applyFilter = (list) => {
    switch (activeFilter) {
      case 'active': return list.filter(t => !t.done);
      case 'done':   return list.filter(t => t.done);
      case 'recruit': case 'inrudder': case 'private':
        return list.filter(t => t.category === activeFilter);
      default: return list;
    }
  };
  
  const visibleOwn = applyFilter(ownTodos);
  const area = document.getElementById('taskArea');
  area.innerHTML = '';
  
  if (!visibleOwn.length) {
    area.innerHTML = `<div class="empty-msg">${
      activeFilter === 'done'   ? '完了済みのタスクはありません' :
      activeFilter === 'active' ? 'すべて完了しました！' :
                                  'タスクを追加してみましょう'
    }</div>`;
    return;
  }
    
  const ul = document.createElement('div');
  ul.className = 'task-list';
  visibleOwn.forEach(t => ul.appendChild(buildItem(t)));
  area.appendChild(ul);
}
      
function buildItem(t) {
  const item = document.createElement('div');
  item.className = 'item' + (t.done ? ' done' : '');
     
  const chk = document.createElement('input');
  chk.type = 'checkbox';
  chk.className = 'chk';
  chk.checked = t.done;
  chk.addEventListener('change', () => onToggle(t.id, item, chk));
  
  const body = document.createElement('div');
  body.className = 'item-body';
      
  const top = document.createElement('div');
  top.className = 'item-top';
    
  const catTag = document.createElement('span');
  catTag.className = `cat-tag ${t.category}`;
  catTag.textContent = CAT[t.category] || t.category;
  
  const textEl = document.createElement('span');
  textEl.className = 'item-text';
  textEl.textContent = t.text;
  textEl.title = 'ダブルクリックで編集';
  textEl.addEventListener('dblclick', () => startEdit(t.id, textEl));

  const del = document.createElement('button');
  del.type = 'button';
  del.className = 'btn-del';
  del.textContent = '削除';
  del.addEventListener('click', () => onDelete(t.id));
  
  top.append(catTag, textEl, del);
  
  const memo = document.createElement('textarea');
  memo.className = 'item-memo';
  memo.placeholder = 'メモを追加...';
  memo.value = t.memo || '';
  memo.rows = 1;
  if (t.done) memo.disabled = true;
  
  const resize = () => { memo.style.height = 'auto'; memo.style.height = memo.scrollHeight + 'px'; };
  memo.addEventListener('input', resize);  
  requestAnimationFrame(resize);
    
  memo.addEventListener('blur', () => {
    const v = memo.value;
    if (v !== (t.memo || '')) { t.memo = v; save(); }
  });
  memo.addEventListener('keydown', e => e.stopPropagation());
      
  body.append(top, memo);
     
  const handle = document.createElement('div');
  handle.className = 'drag-handle';
  handle.textContent = '⠿';
  handle.title = 'ドラッグして並び替え';
  
  item.dataset.id = String(t.id);
  item.append(handle, chk, body);
  setupDrag(item, t.id, handle);
  return item;
}
let dragId = null;
function setupDrag(item, id, handle) {
  handle.addEventListener('mousedown', () => { item.draggable = true; });
  item.addEventListener('dragstart', e => {
    dragId = id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => item.classList.add('dragging'), 0);
  });
  item.addEventListener('dragover', e => {
    e.preventDefault();
    if (dragId !== id) {
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    }
  });
  item.addEventListener('dragleave', e => {
    if (!item.contains(e.relatedTarget)) item.classList.remove('drag-over');
  });
  item.addEventListener('drop', e => {
    e.preventDefault();
    item.classList.remove('drag-over');
    if (dragId !== null && dragId !== id) {
      const rect = item.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      reorderTodos(dragId, id, before);
    }
  });
  item.addEventListener('dragend', () => {
    item.draggable = false;
    item.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragId = null;
  });
  
  let clone = null, offX = 0, offY = 0, touchOver = null;
  handle.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = item.getBoundingClientRect();
    offX = touch.clientX - rect.left;
    offY = touch.clientY - rect.top;
    dragId = id;
    clone = item.cloneNode(true);
    Object.assign(clone.style, {
      position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
      width: rect.width + 'px', zIndex: '9998', pointerEvents: 'none',
      opacity: '0.88', transform: 'scale(1.03) rotate(0.6deg)',
      boxShadow: '0 10px 36px rgba(0,0,0,0.5)', margin: '0', animation: 'none',
    });
    document.body.appendChild(clone);  
    item.classList.add('dragging');
  }, { passive: false });

  handle.addEventListener('touchmove', e => {
    if (dragId !== id || !clone) return;
    e.preventDefault();
    const touch = e.touches[0];
    clone.style.left = (touch.clientX - offX) + 'px';
    clone.style.top  = (touch.clientY - offY) + 'px';
    clone.style.visibility = 'hidden';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    clone.style.visibility = '';
    const overItem = el?.closest('.item[data-id]');
    const overId = overItem ? parseInt(overItem.dataset.id) : null;
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    if (overId !== null && overId !== id) { overItem.classList.add('drag-over'); touchOver = overId; }
    else { touchOver = null; }
  }, { passive: false });

  handle.addEventListener('touchend', () => {
    if (dragId !== id) return;
    clone?.remove(); clone = null;
    item.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    if (touchOver !== null && touchOver !== id) reorderTodos(id, touchOver, false);
    dragId = null; touchOver = null;
  });
} 
  
function reorderTodos(srcId, tgtId, insertBefore) {
  const srcIdx = todos.findIndex(t => t.id === srcId);
  const tgtIdx = todos.findIndex(t => t.id === tgtId);
  if (srcIdx === -1 || tgtIdx === -1) return;
  const [removed] = todos.splice(srcIdx, 1);
  const newTgt = todos.findIndex(t => t.id === tgtId);
  todos.splice(insertBefore ? newTgt : newTgt + 1, 0, removed);
  save(); buildSidebar(); renderMain();
}
    
function startEdit(id, textEl) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'edit-input';
  inp.value = t.text; inp.maxLength = 200;   
  textEl.replaceWith(inp);
  inp.focus(); inp.select();
  let composing = false;
  inp.addEventListener('compositionstart', () => { composing = true; });
  inp.addEventListener('compositionend',   () => { composing = false; });
  const commit = () => {
    const v = inp.value.trim();
    if (v && v !== t.text) { t.text = v; save(); }
    buildSidebar(); renderMain();
  };
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !composing) { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); buildSidebar(); renderMain(); }
  });
  inp.addEventListener('blur', commit);
}
  
function onAdd() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }  
  const cat = document.getElementById('catSelect').value;
  todos.push({ id: Date.now(), text, memo: '', done: false, date: selectedDate, category: cat });
  input.value = ''; input.focus();
  save(); buildSidebar(); renderMain();      
}
function onToggle(id, itemEl, chkEl) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  save();
  if (t.done) {
    itemEl.classList.add('completing');
    spawnParticles(chkEl);
    setTimeout(() => { buildSidebar(); renderMain(); }, 560);
  } else {
    buildSidebar(); renderMain();
  }  
}
 
function onDelete(id) {
  todos = todos.filter(t => t.id !== id);
  save(); buildSidebar(); renderMain();
}
  
function onClearDone() {
  todos = todos.filter(t => !(t.date === selectedDate && t.done));
  save(); buildSidebar(); renderMain();
}
const canvas = document.getElementById('p-canvas');
const ctx = canvas.getContext('2d');  
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();  
window.addEventListener('resize', resizeCanvas);
let particles = [], rafId = null;
const COLORS = ['#7c6af7','#a78cf7','#5af7a0','#f7a25a','#f75a5a','#f7e05a','#5ab8f7','#f75adb'];
    
function spawnParticles(sourceEl) {
  const r = sourceEl.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  for (let i = 0; i < 30; i++) { 
    const angle = Math.random() * Math.PI * 2, speed = 2.5 + Math.random() * 6;
    particles.push({ x: cx, y: cy, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed-1.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      w: 4+Math.random()*6, h: 3+Math.random()*4, life: 1,
      decay: 0.022+Math.random()*0.018, rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.25 });
  }
  if (!rafId) rafId = requestAnimationFrame(animLoop);
}
  
function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= p.decay; p.rot += p.rotSpeed;
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.color;
    roundRect(ctx, -p.w/2, -p.h/2, p.w, p.h, 1.5); ctx.fill(); ctx.restore();
      }
  if (particles.length > 0) { rafId = requestAnimationFrame(animLoop); }
  else { ctx.clearRect(0, 0, canvas.width, canvas.height); rafId = null; }
}
  
function roundRect(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x+r, y); c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r); c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h); c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r); c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y); c.closePath();
}
      
document.getElementById('addBtn').addEventListener('click', onAdd);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') e.preventDefault();
});
document.getElementById('clearDoneBtn').addEventListener('click', onClearDone);
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMain();
  });
});
  
buildSidebar(true);
renderMain();
</script>
