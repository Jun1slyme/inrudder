<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TODO</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13; --sidebar-bg: #111118; --surface: #1a1a24;
  --border: #2a2a3a; --accent: #7c6af7; --text: #e8e8f0;
  --text-muted: #6b6b82; --danger: #f75a5a; --success: #5af7a0;
  --radius: 12px;
  --cat-recruit: #f7a25a; --cat-inrudder: #7c6af7; --cat-private: #5af7a0;
  --pri-high: #f75a5a; --pri-mid: #f7a25a; --pri-low: #5ab8f7;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { width: 180px; flex-shrink: 0; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-logo { padding: 20px 18px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo-text { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
.btn-week-plan { background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.35); border-radius: 7px; color: var(--accent); cursor: pointer; font-size: 0.65rem; font-weight: 600; padding: 4px 8px; transition: background 0.13s; white-space: nowrap; }
.btn-week-plan:hover { background: rgba(124,106,247,0.3); }
.btn-week-plan.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.sidebar-dates { overflow-y: auto; flex: 1; padding: 6px 0; }
.sidebar-dates::-webkit-scrollbar { width: 3px; }
.sidebar-dates::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.date-item { display: flex; flex-direction: column; gap: 1px; padding: 8px 14px; margin: 2px 6px; border-radius: 9px; cursor: pointer; transition: background 0.12s; position: relative; }
.date-item:hover { background: var(--surface); }
.date-item.active { background: var(--accent); }
.d-label { font-size: 0.88rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
.today-badge { font-size: 0.56rem; background: rgba(255,255,255,0.18); padding: 1px 5px; border-radius: 20px; font-weight: 500; }
.date-item.active .today-badge { background: rgba(255,255,255,0.25); }
.d-week { font-size: 0.66rem; color: var(--text-muted); }
.date-item.active .d-week, .date-item.active .d-count { color: rgba(255,255,255,0.65); }
.d-count { font-size: 0.63rem; color: var(--text-muted); margin-top: 1px; }
/* 負荷バー */
.d-load-bar { height: 2px; border-radius: 1px; margin-top: 3px; background: var(--border); overflow: hidden; }
.d-load-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }
.date-item.active .d-load-bar { background: rgba(255,255,255,0.2); }
.date-item.active .d-load-fill { background: rgba(255,255,255,0.7) !important; }
.has-todo-badge { min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: var(--danger); color: #fff; font-size: 0.58rem; font-weight: 700; display: flex; align-items: center; justify-content: center; position: absolute; right: 7px; top: 50%; transform: translateY(-50%); line-height: 1; }
.date-item.active .has-todo-badge { background: rgba(255,255,255,0.85); color: var(--accent); }

/* 週区切り */
.week-sep { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 18px 3px; opacity: 0.6; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 32px 40px 24px; }
.main-header { margin-bottom: 18px; flex-shrink: 0; }
.main-date-label { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.4px; }
.main-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 10px; }
.progress-wrap { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; max-width: 200px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78cf7); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

/* 繰り越しバナー */
.carryover-banner { background: rgba(247,162,90,0.1); border: 1px solid rgba(247,162,90,0.3); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; flex-shrink: 0; display: none; }
.carryover-banner.visible { display: block; }
.carryover-title { font-size: 0.78rem; font-weight: 600; color: var(--cat-recruit); margin-bottom: 6px; }
.carryover-list { display: flex; flex-direction: column; gap: 5px; }
.carryover-item { display: flex; align-items: center; gap: 8px; font-size: 0.76rem; }
.carryover-text { flex: 1; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.carryover-day-btns { display: flex; gap: 3px; flex-wrap: wrap; }
.carryover-day-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; color: var(--text-muted); cursor: pointer; font-size: 0.64rem; padding: 2px 7px; transition: all 0.13s; white-space: nowrap; }
.carryover-day-btn:hover { border-color: var(--accent); color: var(--text); }
.carryover-day-btn.overloaded { color: var(--danger); border-color: rgba(247,90,90,0.3); }

/* 入力エリア */
.input-area { margin-bottom: 14px; flex-shrink: 0; }
.input-row { display: flex; gap: 8px; }
.task-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.93rem; padding: 10px 14px; outline: none; transition: border-color 0.15s; min-width: 0; }
.task-input::placeholder { color: var(--text-muted); }
.task-input:focus { border-color: var(--accent); }
.cat-select, .pri-select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.78rem; padding: 0 10px; outline: none; cursor: pointer; flex-shrink: 0; height: 42px; }
.cat-select:focus, .pri-select:focus { border-color: var(--accent); }
.pri-select { width: 72px; }
.btn-add { background: var(--accent); border: none; border-radius: var(--radius); color: #fff; cursor: pointer; font-size: 1.3rem; width: 44px; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
.btn-add:hover { background: #9182ff; }
.btn-add:active { transform: scale(0.94); }

/* フィルター */
.filter-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; flex-shrink: 0; }
.f-btn { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); cursor: pointer; font-size: 0.71rem; padding: 4px 10px; transition: all 0.13s; white-space: nowrap; }
.f-btn:hover { border-color: var(--accent); color: var(--text); }
.f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.stats-row { display: flex; align-items: center; margin-bottom: 8px; flex-shrink: 0; }
.stats-txt { font-size: 0.76rem; color: var(--text-muted); }
.clear-btn { margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.72rem; text-decoration: underline; transition: color 0.13s; }
.clear-btn:hover { color: var(--danger); }

/* タスクリスト */
.task-area { flex: 1; overflow-y: auto; padding-right: 4px; }
.task-area::-webkit-scrollbar { width: 4px; }
.task-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.section-lbl { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.09em; margin: 12px 0 7px 2px; }
.section-lbl:first-child { margin-top: 0; }
.task-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 4px; }

/* タスクアイテム */
.item { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; transition: border-color 0.13s; animation: slideIn 0.17s ease; position: relative; overflow: hidden; }
.item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.item.pri-high::before { background: var(--pri-high); }
.item.pri-mid::before  { background: var(--pri-mid); }
.item.pri-low::before  { background: var(--pri-low); }
.item.pri-none::before { background: transparent; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.item:hover { border-color: #3a3a50; }
.item.done { opacity: 0.4; }
@keyframes completePulse { 0% { background: var(--surface); } 25% { background: rgba(90,247,160,0.10); border-color: rgba(90,247,160,0.35); } 100%{ background: var(--surface); } }
.item.completing { animation: completePulse 0.55s ease forwards; }
.drag-handle { flex-shrink: 0; color: var(--text-muted); cursor: grab; font-size: 1rem; line-height: 1; padding: 2px 1px; margin-top: 2px; user-select: none; touch-action: none; opacity: 0; transition: opacity 0.13s; }
.item:hover .drag-handle { opacity: 0.6; }
.drag-handle:hover { opacity: 1 !important; }
.drag-handle:active { cursor: grabbing; }
.item.dragging { opacity: 0.3 !important; border-style: dashed !important; }
.item.drag-over { border-color: var(--accent) !important; border-style: dashed !important; background: rgba(124,106,247,0.07) !important; }
.chk { appearance: none; width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; outline: none; position: relative; transition: border-color 0.13s, background 0.13s; margin-top: 2px; }
.chk:hover { border-color: var(--accent); }
.chk:checked { background: var(--success); border-color: var(--success); animation: checkPop 0.32s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes checkPop { 0% { transform: scale(0.75); } 60% { transform: scale(1.22); } 100%{ transform: scale(1); } }
.chk:checked::after { content: ''; position: absolute; top: 2px; left: 4px; width: 7px; height: 9px; border: 2px solid #0f0f13; border-top: none; border-left: none; transform: rotate(45deg); }
.item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.item-top { display: flex; align-items: center; gap: 6px; min-width: 0; flex-wrap: wrap; }
.cat-tag { font-size: 0.6rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; letter-spacing: 0.02em; white-space: nowrap; }
.cat-tag.recruit { background: rgba(247,162,90,0.13); color: var(--cat-recruit); }
.cat-tag.inrudder { background: rgba(124,106,247,0.15); color: var(--cat-inrudder); }
.cat-tag.private { background: rgba(90,247,160,0.12); color: var(--cat-private); }
.pri-badge { font-size: 0.58rem; font-weight: 700; padding: 1px 6px; border-radius: 20px; flex-shrink: 0; letter-spacing: 0.03em; }
.pri-badge.high { background: rgba(247,90,90,0.13); color: var(--pri-high); }
.pri-badge.mid  { background: rgba(247,162,90,0.13); color: var(--pri-mid); }
.pri-badge.low  { background: rgba(90,184,247,0.13); color: var(--pri-low); }
.item-text { flex: 1; font-size: 0.91rem; line-height: 1.4; word-break: break-word; min-width: 0; cursor: default; }
.done .item-text { text-decoration: line-through; color: var(--text-muted); }
.item-memo { width: 100%; background: none; border: none; border-top: 1px solid transparent; color: var(--text-muted); font-family: inherit; font-size: 0.76rem; line-height: 1.55; outline: none; resize: none; overflow: hidden; padding: 4px 0 0; margin-top: 4px; transition: border-top-color 0.13s, color 0.13s; }
.item-memo:focus { border-top-color: var(--border); color: var(--text); }
.item-memo::placeholder { color: #333345; }
.done .item-memo { pointer-events: none; }
.btn-del { background: rgba(247,90,90,0.07); border: 1px solid rgba(247,90,90,0.2); border-radius: 6px; color: var(--danger); cursor: pointer; font-size: 0.7rem; font-weight: 500; padding: 3px 8px; flex-shrink: 0; transition: background 0.13s, border-color 0.13s; white-space: nowrap; }
.btn-del:hover { background: rgba(247,90,90,0.18); border-color: rgba(247,90,90,0.45); }
.edit-input { flex: 1; background: var(--bg); border: 1px solid var(--accent); border-radius: 6px; color: var(--text); font-size: 0.91rem; line-height: 1.4; outline: none; padding: 1px 8px; min-width: 0; }
.empty-msg { text-align: center; color: var(--text-muted); font-size: 0.86rem; padding: 32px 0; }

/* ── 週間プランモード ── */
.week-plan-view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.week-plan-view.visible { display: flex; }
.day-view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.day-view.visible { display: flex; }
.week-plan-header { margin-bottom: 16px; flex-shrink: 0; display: flex; align-items: center; gap: 14px; }
.week-plan-title { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; }
.week-nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 4px 10px; transition: all 0.13s; }
.week-nav-btn:hover { border-color: var(--accent); color: var(--text); }
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex: 1; overflow: hidden; }
.week-col { display: flex; flex-direction: column; overflow: hidden; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); min-height: 0; }
.week-col.today-col { border-color: var(--accent); }
.week-col.drag-over-col { border-color: var(--accent); border-style: dashed; background: rgba(124,106,247,0.06); }
.week-col-header { padding: 8px 10px 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.week-col-date { font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
.week-col-weekday { font-size: 0.64rem; color: var(--text-muted); margin-top: 1px; }
.week-load-bar { height: 2px; margin-top: 5px; border-radius: 1px; background: var(--border); overflow: hidden; }
.week-load-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }
.today-col .week-col-date { color: var(--accent); }
.week-task-count { font-size: 0.6rem; font-weight: 600; padding: 1px 5px; border-radius: 10px; }
.week-col-body { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
.week-col-body::-webkit-scrollbar { width: 2px; }
.week-col-body::-webkit-scrollbar-thumb { background: var(--border); }
.week-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 0.73rem; cursor: grab; position: relative; overflow: hidden; display: flex; align-items: flex-start; gap: 5px; transition: border-color 0.13s, opacity 0.13s; }
.week-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; }
.week-item.pri-high::before { background: var(--pri-high); }
.week-item.pri-mid::before  { background: var(--pri-mid); }
.week-item.pri-low::before  { background: var(--pri-low); }
.week-item.done-item { opacity: 0.35; }
.week-item:hover { border-color: #3a3a50; }
.week-item.dragging { opacity: 0.25; }
.week-item-chk { appearance: none; width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; cursor: pointer; outline: none; margin-top: 1px; transition: background 0.13s; }
.week-item-chk:checked { background: var(--success); border-color: var(--success); }
.week-item-text { flex: 1; line-height: 1.35; word-break: break-word; }
.week-item.done-item .week-item-text { text-decoration: line-through; color: var(--text-muted); }
.week-col-add { padding: 5px 6px; flex-shrink: 0; }
.week-col-add input { width: 100%; background: none; border: 1px dashed var(--border); border-radius: 6px; color: var(--text); font-size: 0.7rem; outline: none; padding: 4px 8px; transition: border-color 0.13s; }
.week-col-add input::placeholder { color: #2a2a3a; }
.week-col-add input:focus { border-color: var(--accent); background: var(--bg); }

/* 週間サマリーパネル */
.week-summary-bar { display: none; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px; }
.week-summary-bar.visible { display: flex; align-items: center; gap: 20px; }
.ws-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.ws-val { font-size: 1.3rem; font-weight: 700; line-height: 1; }
.ws-lbl { font-size: 0.63rem; color: var(--text-muted); }
.ws-sep { width: 1px; height: 32px; background: var(--border); }
.ws-score { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.ws-score-val { font-size: 1.6rem; font-weight: 700; line-height: 1; }
.ws-score-lbl { font-size: 0.62rem; color: var(--text-muted); }

/* canvas */
#p-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

/* ── モバイル ── */
@media (max-width: 768px) {
  body { flex-direction: column !important; height: 100svh !important; overflow: hidden; }
  .sidebar { width: 100% !important; height: auto !important; flex-shrink: 0 !important; flex-direction: column !important; border-right: none !important; border-bottom: 1px solid var(--border); }
  .sidebar-logo { padding: 10px 14px 8px; }
  .logo-text { font-size: 0.95rem; }
  .sidebar-dates { display: flex !important; flex-direction: row !important; overflow-x: auto !important; overflow-y: hidden !important; padding: 0 10px 10px; gap: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .sidebar-dates::-webkit-scrollbar { display: none; }
  .week-sep { display: none; }
  .date-item { flex-direction: column !important; align-items: center !important; text-align: center; flex-shrink: 0; min-width: 48px; padding: 6px 8px; margin: 0; }
  .d-label { font-size: 0.8rem; flex-direction: column !important; align-items: center !important; gap: 1px; }
  .today-badge { font-size: 0.5rem; }
  .d-week { font-size: 0.58rem; }
  .d-count { display: none; }
  .d-load-bar { display: none; }
  .has-todo-badge { right: 2px; top: 2px; transform: none; font-size: 0.52rem; min-width: 13px; height: 13px; }
  .main { flex: 1 !important; overflow-y: auto !important; padding: 14px 14px !important; padding-bottom: 110px !important; }
  .main-date-label { font-size: 1.1rem !important; }
  .input-area { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 200 !important; background: var(--sidebar-bg) !important; border-top: 1px solid var(--border) !important; margin-bottom: 0 !important; padding: 8px 12px !important; padding-bottom: max(10px, env(safe-area-inset-bottom)) !important; }
  .input-row { flex-wrap: wrap !important; gap: 6px; }
  .task-input { width: 100% !important; flex: none !important; font-size: 1rem; }
  .cat-select, .pri-select { flex: 1 !important; font-size: 0.82rem; height: 38px; }
  .btn-add { width: 44px !important; height: 38px !important; }
  .filter-bar { flex-wrap: nowrap !important; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .f-btn { flex-shrink: 0; }
  .task-area { flex: none !important; overflow: visible !important; }
  .item { padding: 10px 11px; }
  .drag-handle { opacity: 0.5 !important; }
  .week-plan-view { padding-bottom: 110px; overflow-y: auto; }
  .week-grid { grid-template-columns: repeat(2, 1fr); overflow-y: auto; grid-auto-rows: 220px; }
  .week-summary-bar { flex-wrap: wrap; gap: 10px; }
  .carryover-banner { display: none !important; }
}
</style>
</head>
<body>
<canvas id="p-canvas"></canvas>

<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-text">TODO</span>
    <button class="btn-week-plan" id="btnWeekPlan">週間</button>
  </div>
  <div class="sidebar-dates" id="sidebarDates"></div>
</aside>

<main class="main" id="mainArea">

  <!-- 日次ビュー -->
  <div class="day-view visible" id="dayView">
    <div class="main-header">
      <div class="main-date-label" id="mainDateLabel"></div>
      <div class="main-meta">
        <span id="mainMeta"></span>
        <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- 繰り越しバナー -->
    <div class="carryover-banner" id="carryoverBanner">
      <div class="carryover-title">⚠️ 未完了タスクの再配置</div>
      <div class="carryover-list" id="carryoverList"></div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" class="task-input" id="taskInput" placeholder="新しいタスクを入力..." maxlength="200" autocomplete="off">
        <select class="cat-select" id="catSelect">
          <option value="recruit">仕事_Recruit</option>
          <option value="inrudder">仕事_InRudder</option>
          <option value="private">プライベート</option>
        </select>
        <select class="pri-select" id="priSelect">
          <option value="none">優先度</option>
          <option value="high">🔴 高</option>
          <option value="mid">🟠 中</option>
          <option value="low">🔵 低</option>
        </select>
        <button type="button" class="btn-add" id="addBtn">+</button>
      </div>
    </div>

    <div class="filter-bar">
      <button type="button" class="f-btn active" data-filter="all">すべて</button>
      <button type="button" class="f-btn" data-filter="active">未完了</button>
      <button type="button" class="f-btn" data-filter="done">完了</button>
      <button type="button" class="f-btn" data-filter="high">🔴 高</button>
      <button type="button" class="f-btn" data-filter="mid">🟠 中</button>
      <button type="button" class="f-btn" data-filter="recruit">Recruit</button>
      <button type="button" class="f-btn" data-filter="inrudder">InRudder</button>
      <button type="button" class="f-btn" data-filter="private">プライベート</button>
    </div>

    <div class="stats-row">
      <span class="stats-txt" id="statsTxt"></span>
      <button type="button" class="clear-btn" id="clearDoneBtn" style="display:none">完了済みを削除</button>
    </div>
    <div class="task-area" id="taskArea"></div>
  </div>

  <!-- 週間プランビュー -->
  <div class="week-plan-view" id="weekView">
    <div class="week-plan-header">
      <button class="week-nav-btn" id="weekPrev">‹</button>
      <div class="week-plan-title" id="weekTitle"></div>
      <button class="week-nav-btn" id="weekNext">›</button>
      <button class="week-nav-btn" id="weekToday" style="margin-left:4px; font-size:0.72rem; padding: 4px 10px;">今週</button>
    </div>
    <div class="week-summary-bar" id="weekSummaryBar"></div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

</main>

<script>
const STORAGE_KEY = 'todos_v4';
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const CAT = { recruit: '仕事_Recruit', inrudder: '仕事_InRudder', private: 'プライベート' };
const PRI_LABEL = { high: '高', mid: '中', low: '低', none: '' };
const LOAD_MAX = 6; // 負荷バー基準タスク数

let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// v3 → v4 マイグレーション（priorityフィールド追加）
todos = todos.map(t => ({ priority: 'none', ...t }));

let selectedDate = todayStr();
let activeFilter = 'all';
let weekMode = false;
let weekOffset = 0; // 0=今週, 1=来週, -1=先週

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function dateToStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2, '0'); }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

function getWeekStart(offset = 0) {
  const today = new Date(); today.setHours(0,0,0,0);
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  return monday;
}
function getWeekDates(offset = 0) {
  const mon = getWeekStart(offset);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i); return dateToStr(d);
  });
}

// ── 負荷カラー ──
function loadColor(count) {
  if (count === 0) return 'var(--border)';
  if (count <= 2) return '#5af7a0';
  if (count <= 4) return '#f7a25a';
  return '#f75a5a';
}

// ── サイドバー ──
function buildSidebar(scrollToSelected = false) {
  const container = document.getElementById('sidebarDates');
  container.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  const todayS = todayStr();
  let selectedEl = null;
  let lastWeekNum = null;

  for (let offset = -30; offset <= 60; offset++) {
    const d = new Date(today); d.setDate(today.getDate() + offset);
    const ds = dateToStr(d);

    // 週区切りラベル（デスクトップのみ）
    const weekNum = getISOWeek(d);
    if (weekNum !== lastWeekNum) {
      const sep = document.createElement('div');
      sep.className = 'week-sep';
      sep.textContent = `W${weekNum}`;
      container.appendChild(sep);
      lastWeekNum = weekNum;
    }

    const isToday = ds === todayS;
    const isSelected = ds === selectedDate;
    const ownTodos = todos.filter(t => t.date === ds);
    const doneCount = ownTodos.filter(t => t.done).length;
    const activeCount = ownTodos.filter(t => !t.done).length;
    const totalCount = ownTodos.length;

    const el = document.createElement('div');
    el.className = 'date-item' + (isToday ? ' today' : '') + (isSelected ? ' active' : '');

    const labelDiv = document.createElement('div');
    labelDiv.className = 'd-label';
    labelDiv.textContent = `${d.getMonth()+1}/${d.getDate()}`;
    if (isToday) {
      const badge = document.createElement('span'); badge.className = 'today-badge'; badge.textContent = '今日';
      labelDiv.appendChild(badge);
    }

    const weekDiv = document.createElement('div');
    weekDiv.className = 'd-week';
    weekDiv.textContent = `（${WEEKDAYS[d.getDay()]}）`;

    const countDiv = document.createElement('div');
    countDiv.className = 'd-count';
    if (totalCount > 0) countDiv.textContent = `${doneCount}/${totalCount} 完了`;

    // 負荷バー
    const loadWrap = document.createElement('div'); loadWrap.className = 'd-load-bar';
    const loadFill = document.createElement('div'); loadFill.className = 'd-load-fill';
    loadFill.style.width = Math.min(totalCount / LOAD_MAX * 100, 100) + '%';
    loadFill.style.background = loadColor(totalCount);
    loadWrap.appendChild(loadFill);

    el.append(labelDiv, weekDiv, countDiv, loadWrap);

    if (activeCount > 0) {
      const badge = document.createElement('div');
      badge.className = 'has-todo-badge'; badge.textContent = activeCount;
      el.appendChild(badge);
    }

    el.addEventListener('click', () => {
      selectedDate = ds;
      if (weekMode) { toggleWeekMode(false); }
      buildSidebar(false); renderMain();
    });

    container.appendChild(el);
    if (isSelected) selectedEl = el;
  }

  if (scrollToSelected && selectedEl) {
    requestAnimationFrame(() => selectedEl.scrollIntoView({ block: 'center', inline: 'center' }));
  }
}

function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
}

// ── 繰り越しバナー ──
function renderCarryover() {
  const todayS = todayStr();
  if (selectedDate !== todayS) { document.getElementById('carryoverBanner').classList.remove('visible'); return; }

  const today = new Date(); today.setHours(0,0,0,0);
  const overdues = todos.filter(t => !t.done && t.date < todayS);
  const banner = document.getElementById('carryoverBanner');
  const list = document.getElementById('carryoverList');

  if (!overdues.length) { banner.classList.remove('visible'); return; }
  banner.classList.add('visible');
  list.innerHTML = '';

  // 今週の残り日（今日以降）
  const weekDates = getWeekDates(0).filter(ds => ds >= todayS);
  const taskCounts = {};
  weekDates.forEach(ds => { taskCounts[ds] = todos.filter(t => t.date === ds && !t.done).length; });

  overdues.forEach(t => {
    const row = document.createElement('div'); row.className = 'carryover-item';
    const txt = document.createElement('span'); txt.className = 'carryover-text'; txt.textContent = t.text;
    const btns = document.createElement('div'); btns.className = 'carryover-day-btns';

    weekDates.forEach(ds => {
      const d = new Date(ds + 'T00:00:00');
      const btn = document.createElement('button'); btn.className = 'carryover-day-btn';
      btn.textContent = `${d.getMonth()+1}/${d.getDate()}(${WEEKDAYS[d.getDay()]})`;
      const cnt = taskCounts[ds] || 0;
      if (cnt >= LOAD_MAX) btn.classList.add('overloaded');
      btn.title = `現在 ${cnt} 件`;
      btn.addEventListener('click', () => {
        t.date = ds; save();
        buildSidebar(); renderMain();
      });
      btns.appendChild(btn);
    });

    row.append(txt, btns);
    list.appendChild(row);
  });
}

// ── 日次レンダー ──
function renderMain() {
  const d = new Date(selectedDate + 'T00:00:00');
  const todayS = todayStr();
  const isToday = selectedDate === todayS;
  const isFuture = selectedDate > todayS;

  document.getElementById('mainDateLabel').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
  document.getElementById('mainMeta').textContent =
    isToday ? '今日のタスク' : isFuture ? '予定' : '過去のタスク';

  const ownTodos = todos.filter(t => t.date === selectedDate);
  const doneCount = ownTodos.filter(t => t.done).length;
  const pct = ownTodos.length > 0 ? Math.round(doneCount / ownTodos.length * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statsTxt').textContent = ownTodos.length > 0 ? `${doneCount} / ${ownTodos.length} 件完了` : '';
  document.getElementById('clearDoneBtn').style.display = doneCount > 0 ? 'inline' : 'none';

  renderCarryover();

  const applyFilter = list => {
    switch (activeFilter) {
      case 'active': return list.filter(t => !t.done);
      case 'done':   return list.filter(t => t.done);
      case 'high': case 'mid': case 'low': return list.filter(t => t.priority === activeFilter);
      case 'recruit': case 'inrudder': case 'private': return list.filter(t => t.category === activeFilter);
      default: return list;
    }
  };

  const visible = applyFilter(ownTodos);
  const area = document.getElementById('taskArea');
  area.innerHTML = '';

  if (!visible.length) {
    area.innerHTML = `<div class="empty-msg">${
      activeFilter === 'done' ? '完了済みのタスクはありません' :
      activeFilter === 'active' ? 'すべて完了しました！' : 'タスクを追加してみましょう'
    }</div>`;
    return;
  }

  const ul = document.createElement('div'); ul.className = 'task-list';
  visible.forEach(t => ul.appendChild(buildItem(t)));
  area.appendChild(ul);
}

function buildItem(t) {
  const item = document.createElement('div');
  item.className = `item${t.done ? ' done' : ''} pri-${t.priority || 'none'}`;

  const chk = document.createElement('input');
  chk.type = 'checkbox'; chk.className = 'chk'; chk.checked = t.done;
  chk.addEventListener('change', () => onToggle(t.id, item, chk));

  const body = document.createElement('div'); body.className = 'item-body';
  const top = document.createElement('div'); top.className = 'item-top';

  const catTag = document.createElement('span');
  catTag.className = `cat-tag ${t.category}`;
  catTag.textContent = CAT[t.category] || t.category;

  // 優先度バッジ
  if (t.priority && t.priority !== 'none') {
    const priBadge = document.createElement('span');
    priBadge.className = `pri-badge ${t.priority}`;
    priBadge.textContent = PRI_LABEL[t.priority];
    top.appendChild(priBadge);
  }

  const textEl = document.createElement('span');
  textEl.className = 'item-text'; textEl.textContent = t.text;
  textEl.title = 'ダブルクリックで編集';
  textEl.addEventListener('dblclick', () => startEdit(t.id, textEl));

  const del = document.createElement('button');
  del.type = 'button'; del.className = 'btn-del'; del.textContent = '削除';
  del.addEventListener('click', () => onDelete(t.id));

  top.append(catTag, textEl, del);

  const memo = document.createElement('textarea');
  memo.className = 'item-memo'; memo.placeholder = 'メモを追加...';
  memo.value = t.memo || ''; memo.rows = 1;
  if (t.done) memo.disabled = true;
  const resize = () => { memo.style.height = 'auto'; memo.style.height = memo.scrollHeight + 'px'; };
  memo.addEventListener('input', resize);
  requestAnimationFrame(resize);
  memo.addEventListener('blur', () => { if (memo.value !== (t.memo || '')) { t.memo = memo.value; save(); } });
  memo.addEventListener('keydown', e => e.stopPropagation());

  body.append(top, memo);

  const handle = document.createElement('div');
  handle.className = 'drag-handle'; handle.textContent = '⠿'; handle.title = 'ドラッグして並び替え';

  item.dataset.id = String(t.id);
  item.append(handle, chk, body);
  setupDrag(item, t.id, handle);
  return item;
}

// ── ドラッグ（日次） ──
let dragId = null;
function setupDrag(item, id, handle) {
  handle.addEventListener('mousedown', () => { item.draggable = true; });
  item.addEventListener('dragstart', e => {
    dragId = id; e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => item.classList.add('dragging'), 0);
  });
  item.addEventListener('dragover', e => {
    e.preventDefault();
    if (dragId !== id) { document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); item.classList.add('drag-over'); }
  });
  item.addEventListener('dragleave', e => { if (!item.contains(e.relatedTarget)) item.classList.remove('drag-over'); });
  item.addEventListener('drop', e => {
    e.preventDefault(); item.classList.remove('drag-over');
    if (dragId !== null && dragId !== id) {
      const before = e.clientY < item.getBoundingClientRect().top + item.getBoundingClientRect().height / 2;
      reorderTodos(dragId, id, before);
    }
  });
  item.addEventListener('dragend', () => {
    item.draggable = false; item.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragId = null;
  });
}

function reorderTodos(srcId, tgtId, insertBefore) {
  const srcIdx = todos.findIndex(t => t.id === srcId);
  const tgtIdx = todos.findIndex(t => t.id === tgtId);
  if (srcIdx === -1 || tgtIdx === -1) return;
  const [removed] = todos.splice(srcIdx, 1);
  const newTgt = todos.findIndex(t => t.id === tgtId);
  todos.splice(insertBefore ? newTgt : newTgt + 1, 0, removed);
  save(); buildSidebar(); renderMain();
}

function startEdit(id, textEl) {
  const t = todos.find(t => t.id === id); if (!t) return;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'edit-input'; inp.value = t.text; inp.maxLength = 200;
  textEl.replaceWith(inp); inp.focus(); inp.select();
  let composing = false;
  inp.addEventListener('compositionstart', () => { composing = true; });
  inp.addEventListener('compositionend',   () => { composing = false; });
  const commit = () => {
    const v = inp.value.trim();
    if (v && v !== t.text) { t.text = v; save(); }
    buildSidebar(); renderMain();
  };
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !composing) { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); buildSidebar(); renderMain(); }
  });
  inp.addEventListener('blur', commit);
}

function onAdd() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim(); if (!text) { input.focus(); return; }
  const cat = document.getElementById('catSelect').value;
  const priority = document.getElementById('priSelect').value;
  todos.push({ id: Date.now(), text, memo: '', done: false, date: selectedDate, category: cat, priority });
  input.value = ''; input.focus();
  save(); buildSidebar(); renderMain();
}

function onToggle(id, itemEl, chkEl) {
  const t = todos.find(t => t.id === id); if (!t) return;
  t.done = !t.done; save();
  if (t.done) {
    itemEl.classList.add('completing'); spawnParticles(chkEl);
    setTimeout(() => { buildSidebar(); renderMain(); }, 560);
  } else { buildSidebar(); renderMain(); }
}

function onDelete(id) {
  todos = todos.filter(t => t.id !== id);
  save(); buildSidebar(); renderMain();
}

function onClearDone() {
  todos = todos.filter(t => !(t.date === selectedDate && t.done));
  save(); buildSidebar(); renderMain();
}

// ── 週間プランモード ──
function toggleWeekMode(force) {
  weekMode = force !== undefined ? force : !weekMode;
  document.getElementById('dayView').classList.toggle('visible', !weekMode);
  document.getElementById('weekView').classList.toggle('visible', weekMode);
  document.getElementById('btnWeekPlan').classList.toggle('active', weekMode);
  if (weekMode) renderWeekView();
}

function renderWeekView() {
  const dates = getWeekDates(weekOffset);
  const todayS = todayStr();
  const mon = new Date(dates[0] + 'T00:00:00');
  const sun = new Date(dates[6] + 'T00:00:00');

  document.getElementById('weekTitle').textContent =
    `${mon.getFullYear()}年 ${mon.getMonth()+1}月${mon.getDate()}日 〜 ${sun.getMonth()+1}月${sun.getDate()}日`;

  // サマリー
  renderWeekSummary(dates);

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  dates.forEach(ds => {
    const d = new Date(ds + 'T00:00:00');
    const isToday = ds === todayS;
    const dayTodos = todos.filter(t => t.date === ds);
    const doneCount = dayTodos.filter(t => t.done).length;
    const activeCount = dayTodos.filter(t => !t.done).length;

    const col = document.createElement('div');
    col.className = 'week-col' + (isToday ? ' today-col' : '');
    col.dataset.date = ds;

    // ヘッダー
    const header = document.createElement('div'); header.className = 'week-col-header';
    const dateRow = document.createElement('div'); dateRow.className = 'week-col-date';
    dateRow.innerHTML = `<span>${d.getMonth()+1}/${d.getDate()} <span style="color:var(--text-muted);font-weight:400">${WEEKDAYS[d.getDay()]}</span></span>`;

    if (dayTodos.length > 0) {
      const cnt = document.createElement('span'); cnt.className = 'week-task-count';
      cnt.style.background = activeCount > 0 ? 'rgba(124,106,247,0.18)' : 'rgba(90,247,160,0.12)';
      cnt.style.color = activeCount > 0 ? 'var(--accent)' : 'var(--success)';
      cnt.textContent = `${doneCount}/${dayTodos.length}`;
      dateRow.appendChild(cnt);
    }

    const loadWrap = document.createElement('div'); loadWrap.className = 'week-load-bar';
    const loadFill = document.createElement('div'); loadFill.className = 'week-load-fill';
    loadFill.style.width = Math.min(dayTodos.length / LOAD_MAX * 100, 100) + '%';
    loadFill.style.background = loadColor(dayTodos.length);
    loadWrap.appendChild(loadFill);

    header.append(dateRow, loadWrap);

    // タスクボディ
    const body = document.createElement('div'); body.className = 'week-col-body'; body.dataset.date = ds;
    setupWeekColDrop(body, ds);

    dayTodos.forEach(t => {
      const wi = buildWeekItem(t); body.appendChild(wi);
    });

    // インライン追加
    const addRow = document.createElement('div'); addRow.className = 'week-col-add';
    const addInp = document.createElement('input');
    addInp.type = 'text'; addInp.placeholder = '+ 追加'; addInp.maxLength = 200;
    addInp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) {
        const text = addInp.value.trim(); if (!text) return;
        const cat = document.getElementById('catSelect').value;
        const priority = document.getElementById('priSelect').value;
        todos.push({ id: Date.now(), text, memo: '', done: false, date: ds, category: cat, priority });
        addInp.value = ''; save(); buildSidebar(); renderWeekView();
      }
      e.stopPropagation();
    });
    addRow.appendChild(addInp);

    col.append(header, body, addRow);
    grid.appendChild(col);
  });
}

function buildWeekItem(t) {
  const wi = document.createElement('div');
  wi.className = `week-item pri-${t.priority||'none'}${t.done ? ' done-item' : ''}`;
  wi.dataset.id = String(t.id);
  wi.draggable = true;

  const chk = document.createElement('input');
  chk.type = 'checkbox'; chk.className = 'week-item-chk'; chk.checked = t.done;
  chk.addEventListener('change', () => {
    t.done = !t.done; save(); buildSidebar(); renderWeekView();
  });

  const txt = document.createElement('span'); txt.className = 'week-item-text';
  const priEmoji = t.priority === 'high' ? '🔴 ' : t.priority === 'mid' ? '🟠 ' : t.priority === 'low' ? '🔵 ' : '';
  txt.textContent = priEmoji + t.text;
  txt.title = t.text;

  wi.append(chk, txt);

  wi.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', String(t.id));
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => wi.classList.add('dragging'), 0);
  });
  wi.addEventListener('dragend', () => wi.classList.remove('dragging'));
  wi.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (confirm(`「${t.text}」を削除しますか？`)) {
      todos = todos.filter(x => x.id !== t.id);
      save(); buildSidebar(); renderWeekView();
    }
  });

  return wi;
}

function setupWeekColDrop(body, targetDate) {
  const col = () => body.closest('.week-col');
  body.addEventListener('dragover', e => {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    col()?.classList.add('drag-over-col');
  });
  body.addEventListener('dragleave', e => {
    if (!body.contains(e.relatedTarget)) col()?.classList.remove('drag-over-col');
  });
  body.addEventListener('drop', e => {
    e.preventDefault(); col()?.classList.remove('drag-over-col');
    const id = parseInt(e.dataTransfer.getData('text/plain'));
    const t = todos.find(x => x.id === id);
    if (t && t.date !== targetDate) {
      t.date = targetDate; save(); buildSidebar(); renderWeekView();
    }
  });
}

function renderWeekSummary(dates) {
  const bar = document.getElementById('weekSummaryBar');
  const allTodos = dates.flatMap(ds => todos.filter(t => t.date === ds));
  if (allTodos.length === 0) { bar.classList.remove('visible'); return; }

  const done = allTodos.filter(t => t.done).length;
  const total = allTodos.length;
  const pct = Math.round(done / total * 100);
  const highCount = allTodos.filter(t => t.priority === 'high' && !t.done).length;
  const score = pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : pct >= 40 ? '📈' : '💪';

  bar.classList.add('visible');
  bar.innerHTML = `
    <div class="ws-item"><div class="ws-val">${total}</div><div class="ws-lbl">今週の合計</div></div>
    <div class="ws-sep"></div>
    <div class="ws-item"><div class="ws-val" style="color:var(--success)">${done}</div><div class="ws-lbl">完了</div></div>
    <div class="ws-sep"></div>
    <div class="ws-item"><div class="ws-val" style="color:var(--text-muted)">${total-done}</div><div class="ws-lbl">未完了</div></div>
    ${highCount > 0 ? `<div class="ws-sep"></div><div class="ws-item"><div class="ws-val" style="color:var(--pri-high)">${highCount}</div><div class="ws-lbl">高優先残り</div></div>` : ''}
    <div class="ws-score"><div class="ws-score-val">${score} ${pct}%</div><div class="ws-score-lbl">週間達成率</div></div>
  `;
}

// 週ナビ
document.getElementById('weekPrev').addEventListener('click', () => { weekOffset--; renderWeekView(); });
document.getElementById('weekNext').addEventListener('click', () => { weekOffset++; renderWeekView(); });
document.getElementById('weekToday').addEventListener('click', () => { weekOffset = 0; renderWeekView(); });
document.getElementById('btnWeekPlan').addEventListener('click', () => toggleWeekMode());

// ── 紙吹雪 ──
const canvas = document.getElementById('p-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
let particles = [], rafId = null;
const COLORS = ['#7c6af7','#a78cf7','#5af7a0','#f7a25a','#f75a5a','#f7e05a','#5ab8f7','#f75adb'];

function spawnParticles(sourceEl) {
  const r = sourceEl.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < 28; i++) {
    const angle = Math.random()*Math.PI*2, speed = 2.5+Math.random()*6;
    particles.push({ x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-1.5,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      w:4+Math.random()*6, h:3+Math.random()*4, life:1,
      decay:0.022+Math.random()*0.018, rot:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.25 });
  }
  if (!rafId) rafId = requestAnimationFrame(animLoop);
}

function animLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=p.decay; p.rot+=p.rotSpeed;
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color;
    roundRect(ctx,-p.w/2,-p.h/2,p.w,p.h,1.5); ctx.fill(); ctx.restore();
  }
  if (particles.length>0) { rafId=requestAnimationFrame(animLoop); }
  else { ctx.clearRect(0,0,canvas.width,canvas.height); rafId=null; }
}

function roundRect(c,x,y,w,h,r) {
  c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

// ── イベント ──
document.getElementById('addBtn').addEventListener('click', onAdd);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); onAdd(); }
});
document.getElementById('clearDoneBtn').addEventListener('click', onClearDone);
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); renderMain();
  });
});

buildSidebar(true);
renderMain();
