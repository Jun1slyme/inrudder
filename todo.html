<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TODO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f13;
      --sidebar-bg:   #111118;
      --surface:      #1a1a24;
      --border:       #2a2a3a;
      --accent:       #7c6af7;
      --text:         #e8e8f0;
      --text-muted:   #6b6b82;
      --danger:       #f75a5a;
      --success:      #5af7a0;
      --radius:       12px;
      --cat-recruit:  #f7a25a;
      --cat-inrudder: #7c6af7;
      --cat-private:  #5af7a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ══════════════════════════════
       SIDEBAR  (desktop = left col)
       ══════════════════════════════ */
    .sidebar {
      width: 170px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 24px 18px 16px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-dates {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    .sidebar-dates::-webkit-scrollbar { width: 3px; }
    .sidebar-dates::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .date-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 9px 14px;
      margin: 2px 6px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }

    .date-item:hover  { background: var(--surface); }
    .date-item.active { background: var(--accent); }

    .d-label {
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .today-badge {
      font-size: 0.58rem;
      background: rgba(255,255,255,0.18);
      padding: 1px 5px;
      border-radius: 20px;
      font-weight: 500;
    }

    .date-item.active .today-badge { background: rgba(255,255,255,0.25); }

    .d-week { font-size: 0.68rem; color: var(--text-muted); }
    .date-item.active .d-week,
    .date-item.active .d-count { color: rgba(255,255,255,0.65); }

    .d-count { font-size: 0.67rem; color: var(--text-muted); margin-top: 1px; }

    .has-todo-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
    }

    .date-item.active .has-todo-dot { background: rgba(255,255,255,0.5); }

    /* ══════════════════════════════
       MAIN
       ══════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 36px 44px 24px;
    }

    .main-header {
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .main-date-label {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .main-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-wrap {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      max-width: 200px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78cf7);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Input area ── */
    .input-area {
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .task-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      padding: 11px 15px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .task-input::placeholder { color: var(--text-muted); }
    .task-input:focus { border-color: var(--accent); }

    .cat-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
      padding: 0 10px;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .cat-select:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 1.3rem;
      width: 44px;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-add:hover  { background: #9182ff; }
    .btn-add:active { transform: scale(0.94); }

    /* ── Filters ── */
    .filter-bar {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .f-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.73rem;
      padding: 4px 11px;
      transition: all 0.13s;
      white-space: nowrap;
    }

    .f-btn:hover  { border-color: var(--accent); color: var(--text); }
    .f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Stats ── */
    .stats-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .stats-txt { font-size: 0.78rem; color: var(--text-muted); }

    .clear-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.74rem;
      text-decoration: underline;
      transition: color 0.13s;
    }

    .clear-btn:hover { color: var(--danger); }

    /* ── Task area ── */
    .task-area {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .task-area::-webkit-scrollbar { width: 4px; }
    .task-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-lbl {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin: 14px 0 8px 2px;
    }

    .section-lbl:first-child { margin-top: 0; }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 4px;
    }

    /* ══════════════════════════════
       TASK ITEM
       ══════════════════════════════ */
    .item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px;
      transition: border-color 0.13s;
      animation: slideIn 0.17s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { border-color: #3a3a50; }
    .item.done  { opacity: 0.42; }

    @keyframes completePulse {
      0%  { background: var(--surface); }
      25% { background: rgba(90,247,160,0.10); border-color: rgba(90,247,160,0.35); }
      100%{ background: var(--surface); }
    }

    .item.completing { animation: completePulse 0.55s ease forwards; }

    /* Checkbox */
    .chk {
      appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      outline: none;
      position: relative;
      transition: border-color 0.13s, background 0.13s;
      margin-top: 1px;
    }

    .chk:hover { border-color: var(--accent); }

    .chk:checked {
      background: var(--success);
      border-color: var(--success);
      animation: checkPop 0.32s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes checkPop {
      0%  { transform: scale(0.75); }
      60% { transform: scale(1.22); }
      100%{ transform: scale(1); }
    }

    .chk:checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 4.5px;
      width: 7px; height: 10px;
      border: 2px solid #0f0f13;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    /* Item body */
    .item-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* Top row */
    .item-top {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    /* Category tag */
    .cat-tag {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .cat-tag.recruit  { background: rgba(247,162,90,0.13); color: var(--cat-recruit); }
    .cat-tag.inrudder { background: rgba(124,106,247,0.15); color: var(--cat-inrudder); }
    .cat-tag.private  { background: rgba(90,247,160,0.12); color: var(--cat-private); }

    /* Carryover badge */
    .carry-badge {
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
      white-space: nowrap;
      color: var(--danger);
      background: rgba(247,90,90,0.10);
    }

    /* Task name */
    .item-text {
      flex: 1;
      font-size: 0.93rem;
      line-height: 1.4;
      word-break: break-word;
      min-width: 0;
      cursor: default;
    }

    .done .item-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Memo textarea */
    .item-memo {
      width: 100%;
      background: none;
      border: none;
      border-top: 1px solid transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.78rem;
      line-height: 1.55;
      outline: none;
      resize: none;
      overflow: hidden;
      padding: 5px 0 0;
      margin-top: 5px;
      transition: border-top-color 0.13s, color 0.13s;
    }

    .item-memo:focus {
      border-top-color: var(--border);
      color: var(--text);
    }

    .item-memo::placeholder { color: #333345; }

    .done .item-memo { pointer-events: none; }

    /* Delete button */
    .btn-del {
      background: rgba(247,90,90,0.07);
      border: 1px solid rgba(247,90,90,0.2);
      border-radius: 6px;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 4px 9px;
      flex-shrink: 0;
      transition: background 0.13s, border-color 0.13s;
      white-space: nowrap;
    }

    .btn-del:hover { background: rgba(247,90,90,0.18); border-color: rgba(247,90,90,0.45); }

    /* Inline name edit */
    .edit-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.93rem;
      line-height: 1.4;
      outline: none;
      padding: 1px 8px;
      min-width: 0;
    }

    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      padding: 36px 0;
    }

    /* Particle canvas */
    #p-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* ══════════════════════════════
       MOBILE  (≤ 640px)
       ══════════════════════════════ */
    @media (max-width: 640px) {
      body {
        flex-direction: column;
        height: 100dvh;
      }

      /* Sidebar → horizontal top strip */
      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        flex-shrink: 0;
      }

      .sidebar-logo {
        padding: 14px 16px 8px;
        font-size: 1rem;
        border-bottom: none;
      }

      .sidebar-dates {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0 10px 10px;
        gap: 4px;
        scrollbar-width: none;
      }

      .sidebar-dates::-webkit-scrollbar { display: none; }

      .date-item {
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
        min-width: 52px;
        padding: 7px 8px;
        margin: 0;
        text-align: center;
        border-radius: 9px;
      }

      .d-label {
        font-size: 0.85rem;
        flex-direction: column;
        align-items: center;
        gap: 1px;
      }

      .d-week { font-size: 0.63rem; }
      .d-count { display: none; }

      .has-todo-dot {
        right: 4px; top: 4px;
        transform: none;
        width: 4px; height: 4px;
      }

      /* Main → scrollable column */
      .main {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 16px 14px;
        /* space for fixed input bar at bottom */
        padding-bottom: 90px;
      }

      .main-date-label { font-size: 1.2rem; }

      /* Input area → fixed at bottom */
      .input-area {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 100;
        background: var(--sidebar-bg);
        border-top: 1px solid var(--border);
        padding: 10px 14px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        margin-bottom: 0;
      }

      .input-row {
        flex-wrap: wrap;
        gap: 6px;
      }

      /* Full-width text input */
      .task-input {
        width: 100%;
        flex: none;
        font-size: 1rem;
        padding: 10px 14px;
      }

      /* Cat select + add button share second row */
      .cat-select {
        flex: 1;
        font-size: 0.85rem;
        padding: 8px 10px;
        height: 40px;
      }

      .btn-add {
        width: 48px;
        height: 40px;
        font-size: 1.4rem;
      }

      /* Filters → horizontal scroll */
      .filter-bar {
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 2px;
        margin-bottom: 10px;
      }

      .filter-bar::-webkit-scrollbar { display: none; }

      /* Task items */
      .item {
        padding: 11px 12px;
        gap: 10px;
      }

      .chk {
        width: 22px; height: 22px;
      }

      .chk:checked::after {
        top: 3px; left: 5.5px;
        width: 7px; height: 10px;
      }

      .item-text { font-size: 0.9rem; }

      .btn-del {
        font-size: 0.7rem;
        padding: 5px 9px;
      }

      /* Task area: no internal scroll on mobile (main handles it) */
      .task-area {
        flex: none;
        overflow: visible;
        padding-right: 0;
      }
    }
  </style>
</head>
<body>

<canvas id="p-canvas"></canvas>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">TODO</div>
  <div class="sidebar-dates" id="sidebarDates"></div>
</aside>

<!-- Main -->
<main class="main">

  <!-- Header -->
  <div class="main-header">
    <div class="main-date-label" id="mainDateLabel"></div>
    <div class="main-meta">
      <span id="mainMeta"></span>
      <div class="progress-wrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <input type="text" class="task-input" id="taskInput"
             placeholder="新しいタスクを入力..." maxlength="200" autocomplete="off">
      <select class="cat-select" id="catSelect">
        <option value="recruit">仕事_Recruit</option>
        <option value="inrudder">仕事_InRudder</option>
        <option value="private">プライベート</option>
      </select>
      <button type="button" class="btn-add" id="addBtn">+</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <button type="button" class="f-btn active" data-filter="all">すべて</button>
    <button type="button" class="f-btn" data-filter="active">未完了</button>
    <button type="button" class="f-btn" data-filter="done">完了</button>
    <button type="button" class="f-btn" data-filter="recruit">仕事_Recruit</button>
    <button type="button" class="f-btn" data-filter="inrudder">仕事_InRudder</button>
    <button type="button" class="f-btn" data-filter="private">プライベート</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <span class="stats-txt" id="statsTxt"></span>
    <button type="button" class="clear-btn" id="clearDoneBtn" style="display:none">完了済みを削除</button>
  </div>

  <!-- Tasks -->
  <div class="task-area" id="taskArea"></div>

</main>

<script>
// ─── Constants ───────────────────────────────────
const STORAGE_KEY = 'todos_v3';
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const CAT = {
  recruit:  '仕事_Recruit',
  inrudder: '仕事_InRudder',
  private:  'プライベート',
};

// ─── State ───────────────────────────────────────
let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let selectedDate = todayStr();
let activeFilter = 'all';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function dateToStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
}

// ─── Sidebar ─────────────────────────────────────
function buildSidebar(scrollToSelected = false) {
  const container = document.getElementById('sidebarDates');
  container.innerHTML = '';

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayS = todayStr();
  let selectedEl = null;

  for (let offset = -60; offset <= 60; offset++) {
    const d = new Date(today);
    d.setDate(today.getDate() + offset);
    const ds         = dateToStr(d);
    const isToday    = ds === todayS;
    const isSelected = ds === selectedDate;
    const ownTodos   = todos.filter(t => t.date === ds);
    const doneCount  = ownTodos.filter(t => t.done).length;

    const el = document.createElement('div');
    el.className = 'date-item' +
      (isToday    ? ' today'  : '') +
      (isSelected ? ' active' : '');

    const labelDiv = document.createElement('div');
    labelDiv.className = 'd-label';
    labelDiv.textContent = `${d.getMonth()+1}/${d.getDate()}`;

    if (isToday) {
      const badge = document.createElement('span');
      badge.className = 'today-badge';
      badge.textContent = '今日';
      labelDiv.appendChild(badge);
    }

    const weekDiv = document.createElement('div');
    weekDiv.className = 'd-week';
    weekDiv.textContent = `（${WEEKDAYS[d.getDay()]}）`;

    const countDiv = document.createElement('div');
    countDiv.className = 'd-count';
    if (ownTodos.length > 0) {
      countDiv.textContent = `${doneCount}/${ownTodos.length} 完了`;
    }

    el.append(labelDiv, weekDiv, countDiv);

    if (ownTodos.length > 0) {
      const dot = document.createElement('div');
      dot.className = 'has-todo-dot';
      el.appendChild(dot);
    }

    el.addEventListener('click', () => {
      selectedDate = ds;
      buildSidebar(false);
      renderMain();
    });

    container.appendChild(el);
    if (isSelected) selectedEl = el;
  }

  if (scrollToSelected && selectedEl) {
    requestAnimationFrame(() => {
      selectedEl.scrollIntoView({ block: 'center', inline: 'center' });
    });
  }
}

// ─── Main render ─────────────────────────────────
function renderMain() {
  const d       = new Date(selectedDate + 'T00:00:00');
  const todayS  = todayStr();
  const isToday  = selectedDate === todayS;
  const isFuture = selectedDate > todayS;

  document.getElementById('mainDateLabel').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
  document.getElementById('mainMeta').textContent =
    isToday ? '今日のタスク' : isFuture ? '予定' : '過去のタスク';

  const ownTodos  = todos.filter(t => t.date === selectedDate);
  const doneCount = ownTodos.filter(t => t.done).length;

  const pct = ownTodos.length > 0 ? Math.round(doneCount / ownTodos.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statsTxt').textContent =
    ownTodos.length > 0 ? `${doneCount} / ${ownTodos.length} 件完了` : '';
  document.getElementById('clearDoneBtn').style.display =
    doneCount > 0 ? 'inline' : 'none';

  // Carryover: past incomplete tasks (shown on today / future dates)
  let carryovers = [];
  if (selectedDate >= todayS) {
    carryovers = todos.filter(t => t.date < selectedDate && !t.done);
  }

  const applyFilter = (list) => {
    switch (activeFilter) {
      case 'active':                     return list.filter(t => !t.done);
      case 'done':                       return list.filter(t =>  t.done);
      case 'recruit':
      case 'inrudder':
      case 'private': return list.filter(t => t.category === activeFilter);
      default:        return list;
    }
  };

  const visibleOwn   = applyFilter(ownTodos);
  const visibleCarry = activeFilter === 'done' ? [] : applyFilter(carryovers);

  const area = document.getElementById('taskArea');
  area.innerHTML = '';

  const hasCarry = visibleCarry.length > 0;
  const hasOwn   = visibleOwn.length > 0;

  if (!hasCarry && !hasOwn) {
    area.innerHTML = `<div class="empty-msg">${
      activeFilter === 'done'   ? '完了済みのタスクはありません' :
      activeFilter === 'active' ? 'すべて完了しました！'         :
                                  'タスクを追加してみましょう'
    }</div>`;
    return;
  }

  if (hasCarry) {
    area.appendChild(mkLabel(`持ち越しタスク（${visibleCarry.length}件）`));
    const ul = document.createElement('div');
    ul.className = 'task-list';
    visibleCarry.forEach(t => ul.appendChild(buildItem(t, true)));
    area.appendChild(ul);
  }

  if (hasCarry) area.appendChild(mkLabel('この日のタスク'));

  if (hasOwn) {
    const ul = document.createElement('div');
    ul.className = 'task-list';
    visibleOwn.forEach(t => ul.appendChild(buildItem(t, false)));
    area.appendChild(ul);
  } else if (hasCarry) {
    const note = document.createElement('div');
    note.className = 'empty-msg';
    note.style.padding = '16px 0';
    note.textContent = 'タスクはありません';
    area.appendChild(note);
  }
}

function mkLabel(text) {
  const el = document.createElement('div');
  el.className = 'section-lbl';
  el.textContent = text;
  return el;
}

// ─── Build item ──────────────────────────────────
function buildItem(t, isCarry) {
  const item = document.createElement('div');
  item.className = 'item' + (t.done ? ' done' : '');

  // ── Checkbox ──
  const chk = document.createElement('input');
  chk.type = 'checkbox';
  chk.className = 'chk';
  chk.checked = t.done;
  chk.addEventListener('change', () => onToggle(t.id, item, chk));

  // ── Body ──
  const body = document.createElement('div');
  body.className = 'item-body';

  // Top row: [cat] [carry?] [name] [del]
  const top = document.createElement('div');
  top.className = 'item-top';

  const catTag = document.createElement('span');
  catTag.className = `cat-tag ${t.category}`;
  catTag.textContent = CAT[t.category] || t.category;

  const textEl = document.createElement('span');
  textEl.className = 'item-text';
  textEl.textContent = t.text;
  textEl.title = 'ダブルクリックで編集';
  textEl.addEventListener('dblclick', () => startEdit(t.id, textEl));

  const del = document.createElement('button');
  del.type = 'button';
  del.className = 'btn-del';
  del.textContent = '削除';
  del.addEventListener('click', () => onDelete(t.id));

  top.appendChild(catTag);

  if (isCarry) {
    const d = new Date(t.date + 'T00:00:00');
    const badge = document.createElement('span');
    badge.className = 'carry-badge';
    badge.textContent = `${d.getMonth()+1}/${d.getDate()} から`;
    top.appendChild(badge);
  }

  top.append(textEl, del);

  // ── Memo textarea ──
  const memo = document.createElement('textarea');
  memo.className = 'item-memo';
  memo.placeholder = 'メモを追加...';
  memo.value = t.memo || '';
  memo.rows = 1;
  if (t.done) memo.disabled = true;

  // Auto-resize
  const resize = () => {
    memo.style.height = 'auto';
    memo.style.height = memo.scrollHeight + 'px';
  };
  memo.addEventListener('input', resize);
  requestAnimationFrame(resize);

  // Save on blur (no re-render needed)
  memo.addEventListener('blur', () => {
    const v = memo.value;
    if (v !== (t.memo || '')) {
      t.memo = v;
      save();
    }
  });

  // Stop Enter/keys from bubbling to window
  memo.addEventListener('keydown', e => e.stopPropagation());

  body.append(top, memo);
  item.append(chk, body);
  return item;
}

// ─── Inline name edit ────────────────────────────
function startEdit(id, textEl) {
  const t = todos.find(t => t.id === id);
  if (!t) return;

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'edit-input';
  inp.value = t.text;
  inp.maxLength = 200;
  textEl.replaceWith(inp);
  inp.focus();
  inp.select();

  let composing = false;
  inp.addEventListener('compositionstart', () => { composing = true; });
  inp.addEventListener('compositionend',   () => { composing = false; });

  const commit = () => {
    const v = inp.value.trim();
    if (v && v !== t.text) { t.text = v; save(); }
    buildSidebar();
    renderMain();
  };

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !composing) { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); buildSidebar(); renderMain(); }
  });

  inp.addEventListener('blur', commit);
}

// ─── Actions ─────────────────────────────────────
function onAdd() {
  const input = document.getElementById('taskInput');
  const text  = input.value.trim();
  if (!text) { input.focus(); return; }
  const cat = document.getElementById('catSelect').value;
  todos.unshift({
    id: Date.now(),
    text,
    memo: '',
    done: false,
    date: selectedDate,
    category: cat,
  });
  input.value = '';
  input.focus();
  save();
  buildSidebar();
  renderMain();
}

function onToggle(id, itemEl, chkEl) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  save();

  if (t.done) {
    itemEl.classList.add('completing');
    spawnParticles(chkEl);
    setTimeout(() => { buildSidebar(); renderMain(); }, 560);
  } else {
    buildSidebar();
    renderMain();
  }
}

function onDelete(id) {
  todos = todos.filter(t => t.id !== id);
  save();
  buildSidebar();
  renderMain();
}

function onClearDone() {
  todos = todos.filter(t => !(t.date === selectedDate && t.done));
  save();
  buildSidebar();
  renderMain();
}

// ─── Particle system ─────────────────────────────
const canvas = document.getElementById('p-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let particles = [];
let rafId     = null;
const COLORS = ['#7c6af7','#a78cf7','#5af7a0','#f7a25a','#f75a5a','#f7e05a','#5ab8f7','#f75adb'];

function spawnParticles(sourceEl) {
  const r  = sourceEl.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;

  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2.5 + Math.random() * 6;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      w: 4 + Math.random() * 6,
      h: 3 + Math.random() * 4,
      life: 1,
      decay: 0.022 + Math.random() * 0.018,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.25,
    });
  }

  if (!rafId) rafId = requestAnimationFrame(animLoop);
}

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);

  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.life -= p.decay;
    p.rot  += p.rotSpeed;

    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    roundRect(ctx, -p.w/2, -p.h/2, p.w, p.h, 1.5);
    ctx.fill();
    ctx.restore();
  }

  if (particles.length > 0) {
    rafId = requestAnimationFrame(animLoop);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    rafId = null;
  }
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y); c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y,   x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h,   x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y,     x+r, y);
  c.closePath();
}

// ─── Event listeners ─────────────────────────────
document.getElementById('addBtn').addEventListener('click', onAdd);

// Prevent Enter from adding task (IME対策)
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') e.preventDefault();
});

document.getElementById('clearDoneBtn').addEventListener('click', onClearDone);

document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMain();
  });
});

// ─── Init ────────────────────────────────────────
buildSidebar(true);
renderMain();
</script>
</body>
