<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TODO</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13; --sidebar-bg: #111118; --surface: #1a1a24;
  --border: #2a2a3a; --accent: #7c6af7; --text: #e8e8f0;
  --text-muted: #6b6b82; --danger: #f75a5a; --success: #5af7a0;
  --radius: 12px;
  --cat-recruit: #f7a25a; --cat-inrudder: #7c6af7; --cat-private: #5af7a0;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; overflow: hidden; }
.sidebar { width: 170px; flex-shrink: 0; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-logo { padding: 24px 18px 16px; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-dates { overflow-y: auto; flex: 1; padding: 6px 0; }
.sidebar-dates::-webkit-scrollbar { width: 3px; }
.sidebar-dates::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.date-item { display: flex; flex-direction: column; gap: 1px; padding: 9px 14px; margin: 2px 6px; border-radius: 9px; cursor: pointer; transition: background 0.12s; position: relative; }
.date-item:hover { background: var(--surface); }
.date-item.active { background: var(--accent); }
.d-label { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
.today-badge { font-size: 0.58rem; background: rgba(255,255,255,0.18); padding: 1px 5px; border-radius: 20px; font-weight: 500; }
.date-item.active .today-badge { background: rgba(255,255,255,0.25); }
.d-week { font-size: 0.68rem; color: var(--text-muted); }
.date-item.active .d-week, .date-item.active .d-count { color: rgba(255,255,255,0.65); }
.d-count { font-size: 0.67rem; color: var(--text-muted); margin-top: 1px; }
.has-todo-badge { min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: var(--danger); color: #fff; font-size: 0.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); line-height: 1; }
.date-item.active .has-todo-badge { background: rgba(255,255,255,0.85); color: var(--accent); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 36px 44px 24px; }
.main-header { margin-bottom: 20px; flex-shrink: 0; }
.main-date-label { font-size: 1.55rem; font-weight: 700; letter-spacing: -0.4px; }
.main-meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 10px; }
.progress-wrap { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; max-width: 200px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78cf7); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
.input-area { margin-bottom: 16px; flex-shrink: 0; }
.input-row { display: flex; gap: 8px; }
.task-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.95rem; padding: 11px 15px; outline: none; transition: border-color 0.15s; min-width: 0; }
.task-input::placeholder { color: var(--text-muted); }
